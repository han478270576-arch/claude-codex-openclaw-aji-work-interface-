<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>龙虾控制台 · Chat Placeholder</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .chat-shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .chat-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, rgba(7, 20, 35, 0.9), rgba(4, 12, 22, 0.92));
        box-shadow: var(--shadow);
        padding: 28px;
      }

      .chat-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .chat-top h1 {
        margin: 10px 0 0;
        font-size: clamp(30px, 4vw, 54px);
      }

      .chat-copy {
        margin: 18px 0 0;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.8;
      }

      .route-box,
      .next-box {
        margin-top: 20px;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .route-box code {
        color: var(--cyan);
      }

      .next-box ul {
        margin: 10px 0 0;
        padding-left: 18px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <main class="chat-shell">
      <section class="chat-panel">
        <div class="chat-top">
          <div>
            <p class="eyebrow">LOBSTER CONSOLE · CHAT PLACEHOLDER</p>
            <h1 id="agentName">Agent Chat</h1>
          </div>
          <a class="ghost-link" href="./index.html">返回控制台</a>
        </div>

        <p id="chatLead" class="chat-copy">
          这里是 Phase 2 预留的单 agent 聊天壳入口。当前先验证路由、入口和 agent 选择链路，不直接接 OpenClaw 网关会话。
        </p>

        <div class="route-box">
          <strong>当前路由：</strong>
          <code id="routePreview">/lobster/chat.html?agent=unknown</code>
        </div>

        <div class="next-box">
          <strong>Phase 2 下一步</strong>
          <ul>
            <li>把当前 agent 的身份上下文注入聊天页。</li>
            <li>接入网关会话，形成单 agent 会话壳。</li>
            <li>支持会话历史、快捷提示词和 Agent 切换。</li>
          </ul>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const agent = params.get("agent") || "unknown";
      document.querySelector("#agentName").textContent = `${agent} · 聊天页占位`;
      document.querySelector("#routePreview").textContent = `/lobster/chat.html?agent=${agent}`;
      document.querySelector("#chatLead").textContent =
        `当前已选择 ${agent}。这一页先作为二阶段单 agent 聊天界面的占位入口，用来确认跳转链路和信息结构。`;
    </script>
  </body>
</html>
